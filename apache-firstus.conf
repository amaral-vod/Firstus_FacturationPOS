<VirtualHost *:80>
    ServerName 192.168.1.79
    DocumentRoot /var/www/html/Firstus_FacturationPOS/public

    <Directory /var/www/html/Firstus_FacturationPOS/public>
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/firstus-error.log
    CustomLog ${APACHE_LOG_DIR}/firstus-access.log combined
</VirtualHost>
